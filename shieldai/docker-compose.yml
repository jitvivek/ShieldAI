services:
  api:
    build: ./api
    ports:
      - "3000:3000"
    volumes:
      - ./rules:/app/rules:ro
    environment:
      - DATABASE_URL=postgresql://shield:shield@postgres:5432/shieldai
      - REDIS_URL=redis://redis:6379
      - ML_SERVICE_URL=http://ml-service:8000
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=info
      - ML_SERVICE_TIMEOUT_MS=500
      - RATE_LIMIT_FREE_PER_MINUTE=100
      - RATE_LIMIT_FREE_PER_DAY=1000
      - RATE_LIMIT_PAID_PER_MINUTE=1000
      - THRESHOLD_SAFE=0.3
      - THRESHOLD_SUSPICIOUS=0.7
      - API_KEY_CACHE_TTL_SECONDS=300
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ml-service:
    build: ./ml-service
    ports:
      - "8000:8000"
    volumes:
      - model-cache:/app/models
    environment:
      - MODEL_CACHE_DIR=/app/models
      - DEVICE=cpu
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 6G

  dashboard:
    build: ./dashboard
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shield
      POSTGRES_PASSWORD: shield
      POSTGRES_DB: shieldai
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shield"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
  model-cache:
