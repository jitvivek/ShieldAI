display_information:
  name: ShieldAI Workplace
  description: Monitor and secure AI bot interactions in Slack
  background_color: "#0D9488"
  long_description: |
    ShieldAI Workplace scans messages to and from AI bots for PII exposure,
    harmful content, and prompt injection attacks. Supports Hindi, Hinglish,
    Tamil & English. DPDP Act compliant.

features:
  bot_user:
    display_name: ShieldAI
    always_online: true
  slash_commands:
    - command: /shieldai
      description: ShieldAI controls — status, config, report
      usage_hint: "[status|config|report]"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - channels:read
      - channels:history
      - chat:write
      - chat:write.public
      - commands
      - groups:read
      - groups:history
      - im:history
      - mpim:history
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
